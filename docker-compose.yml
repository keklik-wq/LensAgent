services:
  mock-llm:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["python", "docker/mock_llm_server.py"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/v1/chat/completions', data=b'{\"model\":\"gpt-4o-mini\",\"messages\":[]}', headers={'Content-Type':'application/json'}, method='POST'); urllib.request.urlopen(req)"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama
    profiles: ["ollama"]
    volumes:
      - ollama-data:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  spark-history:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - spark-events:/tmp/spark-events
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_DAEMON_MEMORY: "1g"
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=file:/tmp/spark-events -Dspark.history.ui.port=18080"
    command:
      [
        "bash",
        "-lc",
        "/opt/bitnami/spark/sbin/start-history-server.sh && tail -f /opt/bitnami/spark/logs/*history*.out"
      ]
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:18080/api/v1/version')"]
      interval: 5s
      timeout: 3s
      retries: 40

  spark-master:
    image: bitnamilegacy/spark:3.5.6
    working_dir: /opt/bitnami/spark
    volumes:
      - spark-events:/tmp/spark-events
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_WEBUI_PORT: "8080"
    command:
      [
        "bash",
        "-lc",
        "/opt/bitnami/spark/sbin/start-master.sh && tail -f /opt/bitnami/spark/logs/*master*.out"
      ]
    ports:
      - "7077:7077"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080')"]
      interval: 5s
      timeout: 3s
      retries: 40

  spark-worker:
    image: bitnamilegacy/spark:3.5.6
    working_dir: /opt/bitnami/spark
    volumes:
      - spark-events:/tmp/spark-events
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: "4"
      SPARK_WORKER_MEMORY: "8g"
    command:
      [
        "bash",
        "-lc",
        "/opt/bitnami/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/bitnami/spark/logs/*worker*.out"
      ]
    depends_on:
      spark-master:
        condition: service_healthy

  lens-agent:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - spark-events:/tmp/spark-events
    depends_on:
      mock-llm:
        condition: service_healthy
      spark-history:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      LLM_ROUTER_API_KEY: "local-dev-token"
      LOG_LEVEL: "INFO"
    command:
      [
        "python3",
        "main.py",
        "--config",
        "examples/docker/config.docker.yaml"
      ]

  lens-agent-standalone:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - spark-events:/tmp/spark-events
    depends_on:
      mock-llm:
        condition: service_healthy
      spark-history:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      LLM_ROUTER_API_KEY: "local-dev-token"
      LOG_LEVEL: "INFO"
    command:
      [
        "python3",
        "main.py",
        "--config",
        "examples/docker/config.standalone.yaml"
      ]

  lens-agent-ollama:
    build: .
    working_dir: /workspace
    profiles: ["ollama"]
    volumes:
      - .:/workspace
      - spark-events:/tmp/spark-events
    depends_on:
      ollama:
        condition: service_healthy
      spark-history:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"
    command:
      [
        "python3",
        "main.py",
        "--config",
        "examples/docker/config.ollama.yaml"
      ]

volumes:
  spark-events:
  ollama-data:
