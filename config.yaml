llm_router:
  base_url: "https://llm-router.internal"
  api_key_env: "LLM_ROUTER_API_KEY"
  model: "gpt-4o-mini"
  timeout_seconds: 30
  allow_models:
    - "gpt-4o-mini"
    - "gpt-4.1-mini"

spark_history:
  base_url: "https://spark-history.internal"
  timeout_seconds: 20

k8s:
  kube_context: "prod"
  namespace: "spark-jobs"
  allow_pods_prefix: "spark-"
  max_log_bytes: 200000

output_storage:
  type: "hdfs" # hdfs|s3|local
  base_path: "/data/warehouse"
  max_list_files: 5000

policy:
  max_actions: 5
  allow_actions:
    - "set_spark_conf"
    - "recommend_partitioning"
    - "recommend_output_format"
    - "recommend_file_layout"
    - "request_additional_logs"

runtime:
  dry_run: true
