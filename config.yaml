llm:
  backend: "router"
  router:
    base_url: "https://llm-router.internal"
    api_key_env: "LLM_ROUTER_API_KEY"
    model: "gpt-4o-mini"
    timeout_seconds: 30
    allow_models:
      - "gpt-4o-mini"

spark_runtime:
  backend: "kubernetes"
  kubernetes:
    kube_context: null

spark_history:
  backend: "http"
  http:
    base_url: "https://spark-history.internal"
    timeout_seconds: 30

tuning:
  params:
    spark.sql.shuffle.partitions:
      path:
        - "spec"
        - "sparkConf"
        - "spark.sql.shuffle.partitions"
      type: "int"
      min: 200
      max: 10000
    executor.cores:
      path: "spec.executor.cores"
      type: "int"
      min: 1
      max: 16
    executor.instances:
      path: "spec.executor.instances"
      type: "int"
      min: 1
      max: 500
    executor.memory_gb:
      path: "spec.executor.memory"
      type: "memory_gb"
      min: 1
      max: 256
  constraints:
    total_memory_gb:
      max: 500
