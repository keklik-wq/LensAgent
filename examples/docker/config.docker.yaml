llm:
  backend: "router"
  router:
    base_url: "http://mock-llm:8000"
    api_key_env: "LLM_ROUTER_API_KEY"
    model: "gpt-4o-mini"
    timeout_seconds: 30
    allow_models:
      - "gpt-4o-mini"

spark_runtime:
  backend: "spark_submit"
  spark_submit:
    spark_submit_bin: "/opt/bitnami/spark/bin/spark-submit"
    master_url: "local[2]"
    deploy_mode: "client"
    event_log_dir: "/tmp/spark-events"
    poll_seconds: 1.0
    timeout_seconds: 180

spark_history:
  backend: "http"
  poll_seconds: 2.0
  timeout_seconds: 180
  http:
    base_url: "http://spark-history:18080"
    timeout_seconds: 30

tuning:
  params:
    spark.sql.shuffle.partitions:
      path:
        - "spec"
        - "sparkConf"
        - "spark.sql.shuffle.partitions"
      type: "int"
      min: 200
      max: 10000
    executor.cores:
      path: "spec.executor.cores"
      type: "int"
      min: 1
      max: 16
    executor.instances:
      path: "spec.executor.instances"
      type: "int"
      min: 1
      max: 500
    executor.memory_gb:
      path: "spec.executor.memory"
      type: "memory_gb"
      min: "1g"
      max: "256g"
  constraints:
    total_memory_gb:
      max: 500
